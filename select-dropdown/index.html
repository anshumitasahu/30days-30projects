<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="hero">
        <div class="selector">
            <div id="selectField">
                <p id="selectText">
                    Select Social Media
                </p>
                <img src="img/caret-down.svg" class="button">
            </div>
            <ul id="list" class="hide">
                <li class="options">
                    <img src="./img/facebook-logo.svg" >
                    <p>
                        Facebook
                    </p>
                </li>
                <li class="options">
                    <img src="./img/instagram-logo.svg" >
                    <p>
                        Instagram
                    </p>
                </li>
                <li class="options">
                    <img src="./img/youtube-logo.svg" >
                    <p>
                        You-Tube
                    </p>
                </li>
                <li class="options">
                    <img src="./img/pinterest-logo.svg" >
                    <p>
                        Pinterest
                    </p>
                </li>
                <li class="options">
                    <img src="./img/x-logo.svg" >
                    <p>
                        X.com
                    </p>
                </li>
                <li class="options">
                    <img src="./img/whatsapp-logo.svg" >
                    <p>
                        WhatsApp
                    </p>
                </li>
            </ul>
        </div>
    </div>
</body>
<script src="index.js"></script>
</html>

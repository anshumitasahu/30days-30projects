<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <div class="menu">
            <div class="back-icon">
                <img src="./img/caret-left-bold.svg">
            </div>
            <div class="menu-icon">
                <img src="./img/list-bold.svg">
            </div>
        </div>
        <div class="music-content">
            <div class="audio-img">
                <img src="img/Billionare.jpeg" alt="">
            </div>
            <div class="about-music">
                <h3>Bilionera</h3>
                <p>Otilia Brumă</p>
            </div>
            <audio class="song">
                <source src="music/Bilionera Otilia 320 Kbps.mp3">
            </audio>
            <div class="input">
                <input type="range" class="progress">
            </div>
        </div>
        <div class="music-buttons">
            <div>
                <img src="./img/rewind-fill.svg">
            </div>
            <div class="play-btn">
                <img src="./img/play-fill.svg" class="image">
            </div>
            <div>
                <img src="./img/fast-forward-fill.svg">
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>
</html>

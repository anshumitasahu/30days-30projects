<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temprature Converter</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="temp_calc">
        <input type="number" placeholder="Temprature">
        <div class="converters">
            <button onclick="c2f()">°C to F</button>
            <button onclick="c2k()">°C to K</button>
            <button onclick="f2k()">F to K</button>
            <button onclick="f2c()">F to °C</button>
            <button onclick="k2f()">K to F</button>
            <button onclick="k2c()">K to °C</button>
        </div>
        <div class="result">Result:</div>
    </div>
</body>
<script src="index.js"></script>
</html>

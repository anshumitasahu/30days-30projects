<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slideshow</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="slideshow">

        <div class="slide">
            <div class="num">1/3</div>
            <img src="./img/img_nature_wide.jpg" alt="">
            <div class="text">Nature</div>
        </div>

        <div class="slide">
            <div class="num">2/3</div>
            <img src="./img/img_snow_wide.jpg" alt="">
            <div class="text">Snow</div>
        </div>

        <div class="slide">
            <div class="num">3/3</div>
            <img src="./img/img_mountains_wide.jpg" alt="">
            <div class="text">Mountains</div>
        </div>

        <div class="flex">
            <button class="pre" >❮</button>
            <button class="nxt">❯</button>
        </div>

    </div>

    <div class="slideDots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
</body>
<script src="index.js"></script>
</html>

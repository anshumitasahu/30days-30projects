<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="center">
        <div class="input-div">
            <input type="number" id="input1" placeholder="type the number">
            <input type="number" id="input2" placeholder="type the number">
        </div>
        <div class="btn-div">
            <button id="add">+</button>
            <button id="sub">-</button>
            <button id="multi">*</button>
            <button id="div">/</button>
        </div>
        <div id="result">
            ANS: O
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDER PAGE</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <div class="product">
            <div class="gallery">
                <img src="./img/main.jpg" id="productImg">
                <div class="control">
                    <span class="btn active"></span>
                    <span class="btn"></span>
                    <span class="btn"></span>
                </div>
            </div>
            <div class="details">
                <h1>
                    Casual T-Shirt
                </h1>
                <h2>
                    ₹699.00
                </h2>
                <h3>
                    15% off
                </h3>
                <p>
                    Allen Solly offers a premium range of versatile shirts known for brining vibrant colors and modern,
                    unconventional styles to workwear and casual fashion.
                </p>
                <form>
                    <div class="size-select">
                        <p>Size</p>
                        <label for="small">
                            <input type="radio" name="size" id="small">
                            <span>S</span>
                        </label>
                        <label for="medium">
                            <input type="radio" name="size" id="medium">
                            <span>M</span>
                        </label>
                        <label for="large">
                            <input type="radio" name="size" id="large">
                            <span>L</span>
                        </label>
                        <label for="x-large">
                            <input type="radio" name="size" id="x-large">
                            <span>XL</span>
                        </label>
                        <label for="xx-large">
                            <input type="radio" name="size" id="xx-large">
                            <span>XXL</span>
                        </label>
                    </div>
                    <div class="color-select">
                        <p>Color</p>
                        <label for="black">
                            <input type="radio" name="color" id="black">
                            <span class="color-1"></span>
                        </label>
                        <label for="brown">
                            <input type="radio" name="color" id="brown">
                            <span class="color-2"></span>
                        </label>
                        <label for="beige">
                            <input type="radio" name="color" id="beige">
                            <span class="color-3"></span>
                        </label>
                        <label for="blue">
                            <input type="radio" name="color" id="blue">
                            <span class="color-4"></span>
                        </label>
                    </div>
                    <div class="quantity">
                        <p>
                            Quantity
                        </p>
                        <input type="number" value="1">
                    </div>
                </form>
                <button class="buy">Buy Now</button>
            </div>
        </div>
    </div>
</body>

<script src="index.js"></script>
</html>

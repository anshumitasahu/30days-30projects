<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Web Page</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <div class="logo-nav">
            <img src="img/parallelogram-fill.svg" alt="">
            <nav>
                <ul>
                    <li><a href="#">Market</a></li>
                    <li><a href="#">Features</a></li>
                    <li><a href="#">White Papers</a></li>
                    <li><a href="#">About Us</a></li>
                </ul>
            </nav>
        </div>
        <div class="lang">
            <a href="#" class="btn">EN</a>
        </div>
    </header>

    <main>
        <div class="content">
            <h1>
                BUY & <br> SELL <span>Crypto</span>
            </h1>
            <p>
                World's biggest Cryptocurrency available on web as well as mobile phone.
            </p>
            <button>Explore More</button>
        </div>
        <div class="img">
            <img src="img/1000108854.png" alt="">
        </div>
    </main>

    <footer>
        <div class="currency">
            <div class="c-icon">
                <img src="img/bitcoin.png" alt="">
            </div>
            <div class="c-txt">
                <p class="price">$<span id="bitcoin"></span></p>
                <p class="coin">Bitcoin</p>
            </div>
        </div>
        <div class="currency">
            <div class="c-icon">
                <img src="img/eth.png" alt="">
            </div>
            <div class="c-txt">
                <p class="price">$<span id="ethereum"></span></p>
                <p class="coin">Ethereum</p>
            </div>
        </div>
        <div class="currency">
            <div class="c-icon">
                <img src="img/Solana_logo.png" alt="">
            </div>
            <div class="c-txt">
                <p class="price">$<span id="solana"></span></p>
                <p class="coin">Solana</p>
            </div>
        </div>
        <div class="currency">
            <div class="c-icon">
                <img src="img/doge.jpeg" alt="">
            </div>
            <div class="c-txt">
                <p class="price">$<span id="dogecoin"></span></p>
                <p class="coin">Dogecoin</p>
            </div>
        </div>
    </footer>
</body>
<script src="index.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Notification</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="buttons">
        <button onclick="showToast(successMsg)">Open<img src="./img/instagram-logo.svg"></button>

    </div>
    <div class="toast-box">

    </div>
</body>
<script src="./index.js"></script>

</html>
